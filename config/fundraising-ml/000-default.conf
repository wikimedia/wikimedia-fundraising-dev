# This is symlinked to /etc/apache2/sites-enabled/000-default.conf
# in the image's entrypoint.sh script.
ServerAdmin webmaster@localhost
Protocols h2 http/1.1
LoadModule wsgi_module "/srv/ml-venv/lib/python3.11/site-packages/mod_wsgi/server/mod_wsgi-py311.cpython-311-x86_64-linux-gnu.so"
WSGISocketPrefix /tmp/apache2/socks/wsgi

# Send errors to syslog for centralized logging of docker compose application
ErrorLog "| /usr/bin/logger -thttpd -plocal6.err"
CustomLog "| /usr/bin/logger -thttpd -plocal6.notice" combined

<VirtualHost *:9001>
  DocumentRoot /srv/fundraising-ml/src/fraud_service/
  WSGIDaemonProcess fraud_service threads=5 python-home=/srv/ml-venv python-path=/srv/fundraising-ml/src:/srv/ml-venv/lib/python3.11/site-packages
  WSGIScriptAlias / /srv/fundraising-ml/src/fraud_service/wsgi.py

  <Directory /srv/fundraising-ml/src/fraud_service>
    WSGIProcessGroup fraud_service
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptReloading On
    Require all granted
  </Directory>
</VirtualHost>
